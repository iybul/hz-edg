services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sqf_docs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sqf_docs"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        APP_ROOT: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sqf_docs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      RUST_LOG: info
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        APP_ROOT: .
    environment:
      API_UPSTREAM: http://backend:8080
      NGINX_RESOLVER: 127.0.0.11
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
