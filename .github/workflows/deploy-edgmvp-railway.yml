name: Deploy EDGMVP to Railway

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-edgmvp-railway.yml"
      - "EDGMVP/backend/**"
      - "EDGMVP/docker/**"
      - "EDGMVP/frontend/**"
      - "EDGMVP/railway.toml"
      - "EDGMVP/railway.frontend.toml"
      - "EDGMVP/schema.sql"
  workflow_dispatch:

concurrency:
  group: railway-edgmvp-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: EDGMVP

env:
  RAILWAY_PROJECT_ID: bc5b10c8-4f1d-4ba3-89fc-703103a9c118
  RAILWAY_ENVIRONMENT: production
  RAILWAY_BACKEND_SERVICE_ID: 9b7a8938-2fde-406f-9bf1-8f2061f9f755
  RAILWAY_FRONTEND_SERVICE_ID: 13c2cf11-b728-4f1e-ac69-a946908e1656

jobs:
  validate:
    name: Validate Scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - name: Check backend
        working-directory: EDGMVP/backend
        run: cargo check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: EDGMVP/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: EDGMVP/frontend
        run: npm ci

      - name: Build frontend
        working-directory: EDGMVP/frontend
        run: npm run build

      - name: Validate Compose file
        run: docker compose config

  deploy-backend:
    name: Deploy Backend
    needs: validate
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Require Railway token
        if: env.RAILWAY_TOKEN == ''
        run: |
          echo "Set repository secret RAILWAY_TOKEN to a Railway project token."
          exit 1

      - name: Use backend Railway config
        working-directory: .
        run: cp EDGMVP/railway.toml railway.toml

      - name: Link backend service
        working-directory: .
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --service "$RAILWAY_BACKEND_SERVICE_ID"

      - name: Deploy backend service
        working-directory: .
        run: railway up --ci

  deploy-frontend:
    name: Deploy Frontend
    needs: validate
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Require Railway token
        if: env.RAILWAY_TOKEN == ''
        run: |
          echo "Set repository secret RAILWAY_TOKEN to a Railway project token."
          exit 1

      - name: Use frontend Railway config
        working-directory: .
        run: cp EDGMVP/railway.frontend.toml railway.toml

      - name: Link frontend service
        working-directory: .
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --service "$RAILWAY_FRONTEND_SERVICE_ID"

      - name: Deploy frontend service
        working-directory: .
        run: railway up --ci
